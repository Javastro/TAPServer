quarkus.application.name=TAPServer

# registry/resource related
ivoa.baseAddress=http://localhost:8080/
ivoa.registry.authority=authority.changeme
ivoa.dc.organizationName=Organization
ivoa.dc.contactName=Contact Name
ivoa.dc.contactAddress=Contact Address
ivoa.dc.contactEmail=Contact E-mail.
ivoa.dc.contactTelephone=Contact Telephone number

#name of the resource containing the TAP schema XML definition, which must be on the classpath
ivoa.tap.schema=DemoDM.vo-dml.tap.xml
# is the underlying database case sensitive
ivoa.tap.dbCaseSensitive=true
# the timeout for the TAP sync endpoint, in seconds. If the query takes longer than this the server will timeout with an error VOTable response,
# which will contain a reference to the underlying UWS Job which can be queried for the results when they are ready.
# This is to prevent the server from being overloaded by long-running sync queries.
ivoa.tap.sync-timeout-seconds=5

quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
#fix port
%dev.quarkus.datasource.devservices.port=54771
quarkus.datasource.devservices.image-name=images.dev.uksrc.org/library/postgres-pgsphere14:latest
#
# PGSphere
quarkus.hibernate-orm.dialect=org.javastro.ivoacore.pgsphere.PgSphereDialect
quarkus.hibernate-orm.schema-management.create-schemas=true


#default PU ORM setup - mainly for the TAPSchema
quarkus.hibernate-orm.packages=org.ivoa.dm,org.ivoa.vodml.stdtypes,org.javastro.ivoacore.pgsphere,org.javastro.ivoa.tap.entities
quarkus.hibernate-orm.quote-identifiers.strategy = all

# below is new quarkus
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
# this is for the scripts
quarkus.hibernate-orm.scripts.generation=drop-and-create
quarkus.hibernate-orm.scripts.generation.create-target=TAPddl.sql
quarkus.hibernate-orm.scripts.generation.drop-target=TAP_drop_ddl.sql
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true

#datasource/PU ORM setup for UWS storage (TODO are the quotes necessary? The examples have them)
#if a separate database is needed then the datasource should be created and the datasource name should be used here instead of <default>
#quarkus.datasource."uwsstore".db-kind=postgresql
quarkus.hibernate-orm."uwsstore".packages=org.javastro.ivoacore.uws.persist
quarkus.hibernate-orm."uwsstore".schema-management.strategy=drop-and-create
quarkus.hibernate-orm."uwsstore".schema-management.create-schemas=true
quarkus.hibernate-orm."uwsstore".datasource=<default>



#image build
quarkus.container-image.builder=docker
quarkus.container-image.name=tap-server
quarkus.container-image.group=javastro
quarkus.container-image.tag=latest

#Kubernetes/helm
quarkus.kubernetes.image-pull-policy=if-not-present
%prod.quarkus.kubernetes.image-pull-policy=Always
quarkus.helm.description=MVP Tap Server
#FIXME probably do not need ingress in general.
quarkus.kubernetes.ingress.expose=true
quarkus.kubernetes.ingress.path=/tap/*
quarkus.kubernetes.ingress.path-type=Prefix

#force bean scan of ivoa entities
#quarkus.index-dependency.ivoaent.group-id=org.javastro.ivoa
#quarkus.index-dependency.ivoaent.artifact-id=ivoa-entities


#attempt to reduce logging noise from netty websocket
quarkus.log.category."io.netty.handler.codec.http.websocketx".use-parent-handlers=false

# quarkus-tap-lib contains base JAX-RS/CDI resource classes with interceptor annotations
# such as @Transactional. Index it so Quarkus can see those annotations at build time.
quarkus.index-dependency.quarkus-tap-lib.group-id=org.javastro.ivoa.servers
quarkus.index-dependency.quarkus-tap-lib.artifact-id=quarkus-tap-lib
